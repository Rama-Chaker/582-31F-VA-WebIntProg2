<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Arcade Tournament Dashboard</title>

    <!-- Bootstrap CDN -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1>Arcade Tournament Dashboard</h1>

    <p>
        Click "Load Tournaments" to view available arcade tournaments.
    </p>

    <div class="mb-3">
        <button id="loadBtn" class="btn btn-primary">
            Load Tournaments
        </button>

        <button id="clearBtn" class="btn btn-danger">
            Clear
        </button>
    </div>

    <!-- Status Area -->
    <div id="statusMessage" class="alert alert-info">
        Ready to load tournaments.
    </div>

    <!-- Tournament Cards -->
    <h2>Tournaments</h2>

    <div id="tournamentContainer" class="row">
        <p>No tournaments loaded yet.</p>
    </div>

    <!-- Registration Section -->
    <hr>

    <h2>Registrations</h2>

    <div id="registrationContainer">
        <p>Select a tournament to view registrations.</p>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
